experiment_name: mem_safety
algo: memory_meta_lora
device: auto

environment:
  id: "FaithfulAnt-v0"
  max_episode_length: 500
  exclude_current_positions_from_observation: false

train:
  seed: 42
  steps_per_iteration: 10_000
  iterations: 50
  train_epochs: 50
  valid_split_ratio: 0.1

  # low rank learning
  lora_rank: 8
  lora_alpha: 8.0

  # Phase 3A meta-learning
  inner_update_interval: 60
  inner_updates_k: 5

  # Memory
  relative_improvement: 0.025
  absolute_improvement: 0.012
  use_memory: true

  meta_batch_size: 32
  inner_learning_rate: 0.0015
  outer_learning_rate: 0.001
  use_online_adaptation: true
  grad_clip: 2.5
  inner_update_norm_clip: 0.15
  inner_trust_tolerance: 0.03

  dynamics_model:
    hidden_sizes: [512, 512, 512]
    weight_decay: 1.0e-3
    norm_clip: 8.0

  planner:
    type: "cem"
    horizon: 15
    n_candidates: 1000
    discount: 1.0
    num_cem_iters: 5
    percent_elites: 0.1
    alpha: 0.1

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[2,3], [4,5], [6,7]]

eval:
  episodes: 10
  seeds: [0,1,2,3]

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[0,1], [2,3], [4,5], [6,7]]
