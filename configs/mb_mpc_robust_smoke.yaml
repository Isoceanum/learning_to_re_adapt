experiment_name: mb_mpc_robust_smoke
algo: mb_mpc_robust
env: GymAnt-v0
device: auto # cpu or cuda
exclude_current_positions_from_observation: true

train:
  seed: 42 # Global RNG seed for reproducibility
  max_path_length: 300 # Shorter episodes for faster smoke runs.
  steps_per_iteration: 1_500 # Small collection budget.
  iterations: 3 # Just enough to test post-warmup mixed exploration.
  eval_interval_steps: 0 # Disable checkpoint eval during smoke run.
  train_epochs: 3 # Fast training pass.
  batch_size: 256 # Smaller batch for small datasets.
  valid_split_ratio: 0.1

  dynamics_model:
    hidden_sizes: [512, 512, 512]
    learning_rate: 0.0003

  planner:
    type: "cem"
    horizon: 10 # Lighter planning workload than full config.
    n_candidates: 64
    discount: 0.99
    num_cem_iters: 2
    percent_elites: 0.15
    alpha: 0.20

  exploration:
    enabled: true
    min_iteration: 1
    explore_prob: 0.20
    random_action_ratio: 0.50
    noisy_action_std: 0.20

eval:
  episodes: 1
  seeds: [0]
