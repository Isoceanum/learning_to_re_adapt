experiment_name: mb_mpc_env_4
algo: mb_mpc
device: auto # cpu or cuda

environment:
  num_parallel_envs: 4
  id: "FaithfulAnt-v0"
  max_episode_length: 500
  exclude_current_positions_from_observation: false

train:
  seed: 42 # Global RNG seed for reproducibility
  steps_per_iteration: 8_000 # Number of real env steps to collect per iteration before fitting the dynamics model.
  iterations: 10 # Total number of iterations to run
  train_epochs: 10 # Number of training epochs over the collected dataset each iteration
  batch_size: 512 # Transitions per SGD update when training the dynamics model
  valid_split_ratio: 0.1 # Fraction of collected trajectories reserved for epoch validation

  dynamics_model:
    hidden_sizes: [512, 512, 512] # MLP hidden layer
    learning_rate: 0.001 #  learning rate for fitting the dynamics model

  planner:
    type: "cem" # Planner type in _make_planner(); "rs" or "cem".
    horizon: 15 # Planning horizon for RandomShooting/CEM rollouts.
    n_candidates: 1000 # Number of candidate action sequences per planning step.
    discount: 1.0 # Discount factor used in planner rollouts.
    num_cem_iters: 5 # CEM iterations per planning step (only used when type="cem").
    percent_elites:  0.1 # Elite fraction used to refit CEM distribution.
    alpha:  0.1 # CEM smoothing factor for mean/std updates.

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[2,3], [4,5], [6,7]]

eval:
  episodes: 10 # Number of episodes to run per seed
  seeds: [0,1,2,3] # Evaluation seeds

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[2,3], [4,5], [6,7]]