experiment_name: memory_meta_lora_i100_k3 # Experiment name used for output/logging paths.
algo: memory_meta_lora # Trainer key used to select GRBALMPCTrainer.
device: auto # Device selector for BaseTrainer._resolve_device(); "auto" picks CUDA if available.

environment:
  id: "FaithfulAnt-v0"
  max_episode_length: 500
  exclude_current_positions_from_observation: false

train:
  seed: 42 # Seed for BaseTrainer.train_seed; used for env seeding and buffer RNG.
  steps_per_iteration: 10_000 # Env steps collected per outer iteration in train().
  iterations: 50 # Number of outer training iterations in train().
  train_epochs: 50 # Meta-training epochs per iteration in _train_dynamics_for_iteration().
  valid_split_ratio: 0.1 # Fraction of trajectories assigned to eval split in TransitionBuffer.

  # low rank learning
  lora_rank: 4
  lora_alpha: 4.0

  # Phase 3A meta-learning
  inner_update_interval: 100 # N: update once every N environment steps (chunk size).
  inner_updates_k: 3 # K: number of cumulative updates per episode, then freeze.

  meta_batch_size: 32 # Number of task windows per meta-update in _train_dynamics_for_iteration().
  inner_learning_rate:  0.001 # Step size for inner adaptation in compute_adapted_parameters().
  outer_learning_rate: 0.001 # Optimizer LR for meta-updates in DynamicsModel.
  use_online_adaptation: true # Enables per-step adaptation during planning in _collect_steps()/predict().

  dynamics_model:
    hidden_sizes: [512, 512, 512] # MLP hidden layer sizes for DynamicsModel.

  planner:
    type: "cem"
    horizon: 15
    n_candidates: 1000
    discount: 1.0
    num_cem_iters: 5
    percent_elites: 0.1
    alpha:  0.1


  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[2,3], [4,5], [6,7]]

eval:
  episodes: 10 # Episodes per eval seed in BaseTrainer.evaluate().
  seeds: [0,1,2,3] # Seed list used for eval env construction.

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[2,3], [4,5], [6,7]]
