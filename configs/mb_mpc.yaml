experiment_name: mb_mpc_10k
algo: mb_mpc
device: auto # cpu or cuda

environment:
  id: FaithfulAnt-v0
  max_episode_length: 500
  exclude_current_positions_from_observation: false

train:
  seed: 42 # Global RNG seed for reproducibility
  steps_per_iteration: 10_000 # Number of real env steps to collect per iteration before fitting the dynamics model.
  iterations: 50 # Total number of iterations to run
  train_epochs: 50 # Number of training epochs over the collected dataset each iteration
  batch_size: 512 # Transitions per SGD update when training the dynamics model
  valid_split_ratio: 0.1 # Fraction of collected trajectories reserved for epoch validation

  dynamics_model:
    hidden_sizes: [512, 512, 512] # MLP hidden layer
    learning_rate: 0.001 #  learning rate for fitting the dynamics model

  planner:
    type: "cem"
    horizon: 15
    n_candidates: 1000
    discount: 1.0
    num_cem_iters: 5
    percent_elites: 0.1
    alpha:  0.1


  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[2,3], [4,5], [6,7]]

eval:
  episodes: 10 # Episodes per eval seed in BaseTrainer.evaluate().
  seeds: [0,1,2,3] # Seed list used for eval env construction.

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[2,3], [4,5], [6,7]]