experiment_name: task_distribution_grbal_mppi # Experiment name used for output/logging paths.
algo: grbal_mpc # Trainer key used to select GRBALMPCTrainer.
env: FaithfulAnt-v0 # Gymnasium environment id passed into BaseTrainer._make_*_env().
device: auto # Device selector for BaseTrainer._resolve_device(); "auto" picks CUDA if available.
exclude_current_positions_from_observation: false # Passed to gym.make(...); matches BaseTrainer env kwargs.

train:
  seed: 42 # Seed for BaseTrainer.train_seed; used for env seeding and buffer RNG.
  max_path_length: 500 # Max rollout length per episode in _collect_steps().
  steps_per_iteration: 24_000 # Env steps collected per outer iteration in train().
  iterations: 50 # Number of outer training iterations in train().
  train_epochs: 50 # Meta-training epochs per iteration in _train_dynamics_for_iteration().
  eval_interval_steps: 0 # BaseTrainer checkpoint-eval cadence; 0 disables periodic eval during collection.
  valid_split_ratio: 0.1 # Fraction of trajectories assigned to eval split in TransitionBuffer.

  # GrBAL / MAML meta-learning
  support_window_size: 16 # Support window length (inner adaptation) in _sample_meta_batch().
  query_window_size: 10 # Query window length (meta-loss) in _sample_meta_batch().
  meta_batch_size: 32 # Number of task windows per meta-update in _train_dynamics_for_iteration().
  inner_learning_rate:  0.001 # Step size for inner adaptation in compute_adapted_parameters().
  outer_learning_rate: 0.001 # Optimizer LR for meta-updates in DynamicsModel.
  use_online_adaptation: true # Enables per-step adaptation during planning in _collect_steps()/predict().

  dynamics_model:
    hidden_sizes: [512, 512, 512] # MLP hidden layer sizes for DynamicsModel.

  planner:
    type: "mppi" # Planner type in _make_planner(); "rs" or "cem".
    horizon: 15 # Planning horizon for RandomShooting/CEM rollouts.
    n_candidates: 1000 # Number of candidate action sequences per planning step.
    discount: 1.0 # Discount factor used in planner rollouts.

    noise_sigma: 0.3
    lambda_: 1.0


  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[2,3], [4,5], [6,7]] 

eval:
  episodes: 10 # Number of episodes to run per seed
  seeds: [0,1,2,3,4] # Evaluation seeds

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[2,3], [4,5], [6,7]] 
