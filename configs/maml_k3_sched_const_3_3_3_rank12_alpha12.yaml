experiment_name: maml_k3_sched_const_3_3_3_rank12_alpha12
algo: maml_memory_lora
device: auto

environment:
  id: "FaithfulAnt-v0"
  max_episode_length: 500
  exclude_current_positions_from_observation: false

train:
  seed: 42
  steps_per_iteration: 10_000
  iterations: 50
  train_epochs: 50
  valid_split_ratio: 0.1

  # low rank learning
  lora_rank: 12
  lora_alpha: 12.0

  # MAML inner loop
  support_ratio: 0.4
  inner_steps_k: 3
  inner_learning_rate_schedule: [0.003,0.003,0.003]
  outer_learning_rate: 0.001

  # Memory (disabled for Phase 1 sweep)
  use_memory: false
  memory_lookup_steps: 50
  relative_improvement: 0.02
  absolute_improvement: 0.01

  meta_batch_size: 32

  dynamics_model:
    hidden_sizes: [512, 512, 512]
    weight_decay: 1.0e-4
    norm_clip: 10.0

  planner:
    type: "cem"
    horizon: 15
    n_candidates: 1000
    discount: 1.0
    num_cem_iters: 5
    percent_elites: 0.1
    alpha: 0.1

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[2,3], [4,5], [6,7]]

eval:
  episodes: 10
  seeds: [0,1,2,3]

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[0,1], [2,3], [4,5], [6,7]]
