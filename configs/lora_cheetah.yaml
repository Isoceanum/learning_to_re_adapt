experiment_name: lora_cheetah
algo: meta_lora
device: auto

environment:
  id: HalfCheetahTerrain-v0
  max_episode_length: 1000
  exclude_current_positions_from_observation: false

train:
  seed: 42
  steps_per_iteration: 20_000
  iterations: 50
  train_epochs: 50
  valid_split_ratio: 0.1

  # GrBAL / MAML meta-learning
  support_window_size: 32
  query_window_size: 32
  meta_batch_size: 32
  inner_learning_rate: 0.01
  outer_learning_rate: 0.001
  use_online_adaptation: true

  # low rank learning
  lora_rank: 8
  lora_alpha: 8.0

  dynamics_model:
    hidden_sizes: [512, 512, 512]

  planner:
    type: "cem"
    horizon: 15
    n_candidates: 1000
    discount: 1.0
    num_cem_iters: 5
    percent_elites: 0.1
    alpha: 0.1

  perturbation:
    type: terrain
    probability: 1
    terrain_candidate: [gentle, basin]

eval:
  episodes: 10
  seeds: [0, 1, 2, 3]

  perturbation:
    type: terrain
    probability: 1
    terrain_candidate: [hill, steep]
