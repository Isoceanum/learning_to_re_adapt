experiment_name: ts_lora
algo: ts_lora
env: FaithfulAnt-v0 #GymAnt-v5 AntNagabandi-v0
device: auto # cpu or cuda
exclude_current_positions_from_observation: false


train:
  seed: 42 # Global RNG seed for reproducibility
  max_path_length: 500 # Max steps per episode rollout during data collection
  eval_interval_steps: 0

  # lora
  enable_low_rank_adaptation: true
  lora_lr: 0.001
  lora_rank: 6
  lora_alpha: 6

  iterations: 10
  steps_per_iteration: 4000
  train_epochs: 5
  batch_size: 256
  valid_split_ratio: 0.5

  planner:
    type: "faithful_cem" # Planner type in _make_planner(); "rs" or "cem".
    horizon: 15 # Planning horizon for RandomShooting/CEM rollouts.
    n_candidates: 1000 # Number of candidate action sequences per planning step.
    discount: 1.0 # Discount factor used in planner rollouts.
    num_cem_iters: 5 # CEM iterations per planning step (only used when type="cem").
    percent_elites:  0.1 # Elite fraction used to refit CEM distribution.
    alpha:  0.1 # CEM smoothing factor for mean/std updates.

    
  pretrained_dynamics_model:
    model_path:  "outputs/2026-02-09/ant_base_dynamics_epoch_30/model.pt"
    config_path: "outputs/2026-02-09/ant_base_dynamics_epoch_30/config.yaml"

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[0,1]]
    
eval:
  episodes: 2
  seeds: [0,1,2,3,4,5]

  perturbation:
    type: cripple
    probability: 1
    candidate_action_indices: [[0,1]]